name: private-chat

services:
  chat-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 5001
      CORS_ORIGIN: http://localhost:8080
      MAX_MESSAGE_BYTES: 4096
      HEARTBEAT_INTERVAL_MS: 30000
      ROOM_IDLE_TTL_MS: 1800000
      RATE_LIMIT_WINDOW_MS: 10000
      RATE_LIMIT_EVENTS_PER_WINDOW: 120
      LOG_LEVEL: info
    expose:
      - "5001"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:5001/ready"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  chat-client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      chat-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped
